<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Browser Uptime Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .time {
            font-size: 3rem;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .pause {
            background: #ff9800;
        }

        .resume {
            background: #4caf50;
        }

        .reset {
            background: #f44336;
        }

        .history {
            margin-top: 40px;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .day {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h1>Browser Uptime Tracker</h1>
    <div class="time" id="uptime">00:00:00</div>

    <button class="pause" onclick="pause()">Pause</button>
    <button class="resume" onclick="resume()">Resume</button>
    <button class="reset" onclick="reset()">Reset Today</button>

    <div class="history">
        <h2>Last 7 Days</h2>
        <div id="history"></div>
    </div>

    <script>
        let interval;
        let isPaused = false;
        let currentTime = 0;

        const STORAGE_KEY = "uptime_data";
        const TODAY_KEY = new Date().toISOString().slice(0, 10);

        function loadData() {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            currentTime = data[TODAY_KEY] || 0;
            return data;
        }

        function saveData(data) {
            data[TODAY_KEY] = currentTime;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function formatTime(seconds) {
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;
            return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
        }

        function updateUI() {
            document.getElementById("uptime").innerText = formatTime(currentTime);
        }

        function startTimer() {
            interval = setInterval(() => {
                if (!isPaused) {
                    currentTime += 3;
                    let data = loadData();
                    saveData(data);
                    updateUI();
                }
            }, 3000);
        }

        function pause() {
            isPaused = true;
        }

        function resume() {
            isPaused = false;
        }

        function reset() {
            currentTime = 0;
            let data = loadData();
            saveData(data);
            updateUI();
        }

        function renderHistory() {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            let container = document.getElementById("history");
            container.innerHTML = "";

            let dates = Object.keys(data).sort().reverse().slice(0, 7);

            dates.forEach(date => {
                let div = document.createElement("div");
                div.className = "day";
                div.innerText = date + " → " + formatTime(data[date]);
                container.appendChild(div);
            });
        }

        // INIT
        loadData();
        updateUI();
        renderHistory();
        startTimer();

    </script>
</body>

</html>
